<h2>3. 测序数据回帖</h2>
<p>转录组数据分析的核心步骤是从原始测序 reads 回帖（mapping）到参考基因组或转录组，以确定每个 read 的来源位置。该过程通常包括质量控制、索引构建、比对、去重和定量等环节。</p>
