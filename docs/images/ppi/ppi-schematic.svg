<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="PPI network schematic: nodes are proteins, edges are associations, colors indicate functional modules">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; filter: url(#shadow); }
      .title { font: 700 28px system-ui, -apple-system, "Segoe UI", Arial; fill: #0f172a; }
      .sub { font: 500 16px system-ui, -apple-system, "Segoe UI", Arial; fill: #475569; }
      .edge { stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; opacity: 0.9; }
      .edge2 { stroke: #cbd5e1; stroke-width: 2; stroke-linecap: round; opacity: 0.9; }
      .node { stroke: rgba(15,23,42,0.18); stroke-width: 2; }
      .lbl { font: 700 14px system-ui, -apple-system, "Segoe UI", Arial; fill: #0f172a; }
      .pill { fill: rgba(13,148,136,0.10); stroke: rgba(13,148,136,0.26); stroke-width: 1.2; }
      .pilltxt { font: 700 12px system-ui, -apple-system, "Segoe UI", Arial; fill: #0d9488; letter-spacing: 0.02em; }
      .legend { font: 600 13px system-ui, -apple-system, "Segoe UI", Arial; fill: #334155; }
      .note { font: 500 12px system-ui, -apple-system, "Segoe UI", Arial; fill: #64748b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="url(#bg)"/>
  <rect class="card" x="70" y="60" width="1060" height="520" rx="22"/>

  <text class="title" x="120" y="125">ProteinProtein Interaction (PPI) Network</text>
  <text class="sub" x="120" y="155">Nodes = proteins; edges = evidence-based functional associations</text>

  <!-- network edges -->
  <line class="edge" x1="320" y1="310" x2="440" y2="240"/>
  <line class="edge" x1="320" y1="310" x2="420" y2="355"/>
  <line class="edge2" x1="420" y1="355" x2="520" y2="430"/>
  <line class="edge2" x1="440" y1="240" x2="560" y2="270"/>
  <line class="edge" x1="560" y1="270" x2="700" y2="220"/>
  <line class="edge2" x1="560" y1="270" x2="690" y2="310"/>
  <line class="edge" x1="520" y1="430" x2="650" y2="390"/>
  <line class="edge2" x1="650" y1="390" x2="780" y2="430"/>
  <line class="edge" x1="690" y1="310" x2="820" y2="305"/>
  <line class="edge2" x1="700" y1="220" x2="860" y2="235"/>
  <line class="edge2" x1="820" y1="305" x2="900" y2="360"/>
  <line class="edge2" x1="780" y1="430" x2="900" y2="360"/>

  <!-- nodes: Module A (teal) -->
  <circle class="node" cx="320" cy="310" r="26" fill="#0d9488"/>
  <text class="lbl" x="320" y="315" text-anchor="middle" fill="#ffffff">P1</text>

  <circle class="node" cx="440" cy="240" r="22" fill="#14b8a6"/>
  <text class="lbl" x="440" y="245" text-anchor="middle" fill="#ffffff">P2</text>

  <circle class="node" cx="420" cy="355" r="20" fill="#2dd4bf"/>
  <text class="lbl" x="420" y="360" text-anchor="middle" fill="#0f172a">P3</text>

  <!-- nodes: Module B (indigo) -->
  <circle class="node" cx="560" cy="270" r="26" fill="#4f46e5"/>
  <text class="lbl" x="560" y="275" text-anchor="middle" fill="#ffffff">P4</text>

  <circle class="node" cx="700" cy="220" r="22" fill="#6366f1"/>
  <text class="lbl" x="700" y="225" text-anchor="middle" fill="#ffffff">P5</text>

  <circle class="node" cx="690" cy="310" r="20" fill="#818cf8"/>
  <text class="lbl" x="690" y="315" text-anchor="middle" fill="#0f172a">P6</text>

  <!-- nodes: Module C (amber) -->
  <circle class="node" cx="520" cy="430" r="22" fill="#f59e0b"/>
  <text class="lbl" x="520" y="435" text-anchor="middle" fill="#0f172a">P7</text>

  <circle class="node" cx="650" cy="390" r="20" fill="#fbbf24"/>
  <text class="lbl" x="650" y="395" text-anchor="middle" fill="#0f172a">P8</text>

  <circle class="node" cx="780" cy="430" r="20" fill="#fde68a"/>
  <text class="lbl" x="780" y="435" text-anchor="middle" fill="#0f172a">P9</text>

  <!-- hub-ish -->
  <circle class="node" cx="820" cy="305" r="26" fill="#ef4444"/>
  <text class="lbl" x="820" y="310" text-anchor="middle" fill="#ffffff">Hub</text>

  <circle class="node" cx="860" cy="235" r="18" fill="#e2e8f0"/>
  <text class="lbl" x="860" y="240" text-anchor="middle" fill="#0f172a">P10</text>

  <circle class="node" cx="900" cy="360" r="18" fill="#e2e8f0"/>
  <text class="lbl" x="900" y="365" text-anchor="middle" fill="#0f172a">P11</text>

  <!-- labels/pills -->
  <rect class="pill" x="150" y="205" rx="999" ry="999" width="250" height="34"/>
  <text class="pilltxt" x="275" y="227" text-anchor="middle">Modules / clusters</text>

  <rect class="pill" x="150" y="250" rx="999" ry="999" width="250" height="34"/>
  <text class="pilltxt" x="275" y="272" text-anchor="middle">Edge weight = confidence</text>

  <text class="legend" x="150" y="485">How to read</text>
  <text class="note" x="150" y="512">- Modules: same color often indicates shared function or complex membership</text>
  <text class="note" x="150" y="534">- Hubs: highly connected nodes may be important, but require biological validation</text>
  <text class="note" x="150" y="556">- Evidence: in STRING, each edge can be traced to evidence channels</text>
</svg>

