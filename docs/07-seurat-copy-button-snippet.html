<!--
  一键复制按钮 - 粘贴到 07-seurat.html 的说明：
  ==============================================
  1) 在 <style> 里、</style> 之前，加入下面「CSS 片段」
  2) 在 </body> 之前，加入下面「JS 片段」
  然后保存 07-seurat.html，每个 <pre> 代码块右上角会出现「复制代码」按钮。
-->

<!-- ========== 1. CSS 片段（粘贴到 </style> 前） ========== -->
<style id="copy-btn-css">
/* 代码块容器与一键复制按钮 */
.code-wrap {
  position: relative;
  margin: 12px 0;
}
pre {
  padding: 10px 12px 36px 12px;
  border-left: 3px solid #3498db;
  overflow-x: auto;
  margin: 0;
}
.code-copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 6px 12px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85em;
}
.code-copy-btn:hover {
  background: #217dbb;
}
.code-copy-btn.copied {
  background: #27ae60;
}
</style>

<!-- ========== 2. JS 片段（粘贴到 </body> 前） ========== -->
<script id="copy-btn-js">
(function() {
  document.querySelectorAll('pre').forEach(function(pre) {
    var wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    var btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.textContent = '复制代码';
    wrap.appendChild(btn);
    btn.onclick = function() {
      var text = pre.textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(function() { btn.textContent = '复制代码'; btn.classList.remove('copied'); }, 1500);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(function() { btn.textContent = '复制代码'; btn.classList.remove('copied'); }, 1500);
        } catch (e) {}
        document.body.removeChild(ta);
      }
    };
  });
})();
</script>
